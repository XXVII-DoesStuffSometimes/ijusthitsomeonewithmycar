<!DOCTYPE html>

<html>
  <body>
    <button type="button" onclick="loadXMLDoc()">load stuff</button>
    <p id="demo"></p>
    <script>
      function loadXMLDoc() {
        var xmlhttp = new XMLHttpRequest();
        xmlhttp.onreadystatechange = function() {
          if (this.readyState == 4 && this.status == 200) {
            myFunction(this);
          }
        };
        xmlhttp.open("GET", "help.xml", true); // i dont think github will let me do this but wtv
        xmlhttp.send(); // how the fuck does this work
      }

      function myFunction(xml) {
        var x, i, xmlDoc, txt;
        xmlDoc = xml.responseXML;
        console.log(xmlDoc)
        txt = "";
        txt = xmlDoc.getElementsByTagName("root")[0].childNodes[0].nodeValue;
        document.getElementById("demo").innerHTML = txt;
      }
    </script>

  </body>
</html>
