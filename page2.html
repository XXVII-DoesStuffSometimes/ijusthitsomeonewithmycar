<!DOCTYPE html>

<html>
  <body>
    <button type="button" onclick="loadXMLDoc()">load stuff</button>
    <p id="demo"></p>
    <script>
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          myFunction(this);
        }
      };
      xhttp.open("GET", "help.xml", true);
      xhttp.send();
      
      function myFunction(xml) {
        var xmlDoc = xml.responseXML;
        console.log(xmlDoc)
        const parser = new DOMParser();
        xmlDoc = parser.parseFromString(xmlDoc, "application/xml"); // this returns an empty thing im so confused whyy
        // my xml isnt malformed right???
        console.log(xmlDoc)
        var x = xmlDoc.getElementsByTagName("username");
        console.log(x) // what is a HTMLCollection
        console.log(x.childNodes[0].textContent)
        document.getElementById("demo").innerHTML =
          x.childNodes[0].nodeValue;
      }
    </script>

  </body>
</html>
